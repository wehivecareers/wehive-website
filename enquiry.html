<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Wehive</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/jpeg" href="favicon.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <nav class="navbar">...</nav>

    <section class="enquiry-section" style="padding: 80px 0;">
        <div class="container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 50px;">
            <div class="form-wrapper">
                <h2>Let’s Kickstart Your IT Career!</h2>
                <form id="enquiry-form">
                    <input type="text" id="name" placeholder="Full Name *" required>
                    <input type="email" id="email" placeholder="Email Address *" required>
                    <input type="tel" id="phone" placeholder="WhatsApp Number *" required>
                    <select id="profile">
                        <option>Fresh Graduate</option>
                        <option>Engineering Student</option>
                        <option>Career Switcher</option>
                    </select>
                    <select id="course">
                        <option>Full-Stack Development</option>
                        <option>Java Development</option>
                        <option>Python Development</option>
                    </select>
                    <textarea id="message" placeholder="Your Message"></textarea>
                    <button type="submit" class="btn-primary">Request Free Career Counseling</button>
                </form>
            </div>
            <div class="contact-info">
                <h3>Quick Help</h3>
                <p><i class="fa-solid fa-location-dot"></i> Wehive, 5/33, Indira Complex, Bangalore Bypass Road, Koranguchavadi, Salem - 636004.</p>
                <p><i class="fa-solid fa-phone"></i> 9363323993, 6374694563, 9344816272</p>
                <p><i class="fa-solid fa-envelope"></i> wehivecareers@gmail.com</p>
            </div>
        </div>
    </section>
    <script>
        (function(){ emailjs.init("YOUR_EMAILJS_PUBLIC_KEY"); })();
        document.getElementById('enquiry-form').addEventListener('submit', function(e) {
            e.preventDefault();
            emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
                .then(() => alert("Success! We will contact you soon."));
        });
    </script>
</body>
</html>
